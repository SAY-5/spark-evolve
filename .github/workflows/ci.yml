name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: sbt/setup-sbt@v1
      - name: cache sbt
        uses: actions/cache@v4
        with:
          path: |
            ~/.sbt
            ~/.cache/coursier
            ~/.ivy2/cache
          key: sbt-${{ runner.os }}-${{ hashFiles('**/build.sbt', 'project/**') }}
          restore-keys: |
            sbt-${{ runner.os }}-
      - name: scalafmt
        run: sbt -batch scalafmtCheckAll

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: sbt/setup-sbt@v1
      - name: cache sbt
        uses: actions/cache@v4
        with:
          path: |
            ~/.sbt
            ~/.cache/coursier
            ~/.ivy2/cache
          key: sbt-${{ runner.os }}-${{ hashFiles('**/build.sbt', 'project/**') }}
          restore-keys: |
            sbt-${{ runner.os }}-
      - name: unit tests
        run: sbt -batch test

  it-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: sbt/setup-sbt@v1
      - name: cache sbt
        uses: actions/cache@v4
        with:
          path: |
            ~/.sbt
            ~/.cache/coursier
            ~/.ivy2/cache
          key: sbt-${{ runner.os }}-${{ hashFiles('**/build.sbt', 'project/**') }}
          restore-keys: |
            sbt-${{ runner.os }}-
      - name: integration tests (testcontainers)
        env:
          RUN_INTEGRATION: "1"
          TESTCONTAINERS_RYUK_DISABLED: "true"
        run: sbt -batch "IntegrationTest/test"

  assembly:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: sbt/setup-sbt@v1
      - name: cache sbt
        uses: actions/cache@v4
        with:
          path: |
            ~/.sbt
            ~/.cache/coursier
            ~/.ivy2/cache
          key: sbt-${{ runner.os }}-${{ hashFiles('**/build.sbt', 'project/**') }}
          restore-keys: |
            sbt-${{ runner.os }}-
      - name: assembly
        run: sbt -batch assembly
      - uses: actions/upload-artifact@v4
        with:
          name: spark-evolve-jar
          path: target/scala-2.13/spark-evolve.jar

  bench-smoke:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: sbt/setup-sbt@v1
      - name: cache sbt
        uses: actions/cache@v4
        with:
          path: |
            ~/.sbt
            ~/.cache/coursier
            ~/.ivy2/cache
          key: sbt-${{ runner.os }}-${{ hashFiles('**/build.sbt', 'project/**') }}
          restore-keys: |
            sbt-${{ runner.os }}-
      - name: bench (5k events)
        run: bash bench/run.sh 5000
      - name: assert results JSON has expected keys
        run: |
          set -e
          json=$(ls -t bench/results/*.json | head -1)
          echo "checking $json"
          for key in events events_per_sec ms_total parquet_files; do
            grep -q "\"$key\"" "$json" || (echo "missing key $key in $json" && exit 1)
          done
